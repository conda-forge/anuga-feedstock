context:
  name: anuga
  version: "3.3.1"
  sha256: "26ddd0463efbd82133f6b8ab3619651d1eaac5c3b3361ac30c5bdffb7fd5423b"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/anuga-${{ version }}.tar.gz
  sha256: ${{ sha256 }}

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . --no-build-isolation -vv
  skip:
    - match(python, "<3.10")

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
  host:
    - python
    - pip
    - cython
    - meson-python
    - ninja
    - numpy >=2.0.0
    - pybind11
    - if: win
      then: libpython
  run:
    - python
    - numpy >=2.0.0
    - dill >=0.3.7
    - matplotlib-base >=3.7
    - meshpy >=2022.1
    - netcdf4 >=1.6
    - scipy >=1.11
    - utm
    - xarray
    - libgomp  # [linux]
  run_constraints:
    - mpi4py
    - pymetis >=2023.1
    - pyproj >=3.6
    - affine >=2.4
    - rasterio
    - fiona
    - shapely
    - pandas
    - openpyxl

tests:
  - python:
      imports:
        - anuga
  - script:
      - pytest --pyargs anuga -x -q -m "not slow" -p no:warnings
    requirements:
      run:
        - pytest

about:
  homepage: https://github.com/anuga-community/anuga_core
  summary: A set of python modules for tsunami and flood modelling
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - stoiver
