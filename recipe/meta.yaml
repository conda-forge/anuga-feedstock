{% set name = "anuga" %}
{% set version = "3.3.1" %}
{% set sha = "26ddd0463efbd82133f6b8ab3619651d1eaac5c3b3361ac30c5bdffb7fd5423b" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/anuga-{{ version }}.tar.gz
  sha256: {{ sha }}

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  skip: true  # [py<3.9]


requirements:
  build:
    - {{ compiler('c') }}    # [ not win ]
    - {{ compiler('cxx') }}  # [ not win ]
    - {{ stdlib("c") }}      # [ not win ]
    - gcc_win-64                 # [win]
    - gxx_win-64                 # [win]
    - libpython                  # [win]
    - pip
    - toml
    - cython
    - meson-python
    - ninja
    - numpy >=2.0.0

  host:
    - python
    - gcc_win-64                 # [win]
    - gxx_win-64                 # [win]
    - libpython                  # [win]
    - pip
    - toml
    - cython
    - meson-python
    - ninja
    - numpy >=2.0.0


  run:
    - python
    - {{ pin_compatible('numpy') }}
    - affine
    - dill
    - gdal >=3.0.4
    - matplotlib-base
    - meshpy
    - netcdf4
    - pandas
    - pymetis
    - pytest
    - pyproj
    - pytz
    - scipy
    - utm
    - xarray
test:
  imports:
    - anuga
  commands:
    - pytest --pyargs anuga
  requires:
    - pytest

about:
  home: https://github.com/anuga-community/anuga_core
  summary: A set of python modules for tsunami and flood modelling
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - stoiver
